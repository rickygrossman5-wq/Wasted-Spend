<style>
  :root {
    --black:    #0C0C0A;
    --ink:      #161614;
    --card:     #1E1E1C;
    --card-2:   #252523;

    --sans:     'Archivo', system-ui, sans-serif;
    --mono:     'DM Mono', Menlo, monospace;

    --bg: var(--black);

    --surface2: var(--card-2);
    --border: var(--line-soft);

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--black); color: var(--white); font-size: 14px; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  input[type="text"], input[type="number"], textarea, select {

  input::placeholder, textarea::placeholder { color: var(--gray-dim); }

  .dz.ok { border-style: solid; border-color: var(--green); background: rgba(62,207,116,.07); }

  .upload-desc     { font-family: var(--sans); font-size: 13px; color: var(--gray); }

  .delta-pill { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .pill-pos { background: rgba(62,207,116,.15); color: var(--green); }

  .tbl { width: 100%; border-collapse: collapse; font-size: 11px; }

  .tbl thead th:first-child { z-index: 3; background: var(--ink); }
  .tbl tbody tr:nth-child(odd) td:first-child { background: var(--black); }
  .tbl tbody tr:nth-child(even) td:first-child { background: var(--ink); }

  .warn { background: rgba(200,160,0,.1); border: 1px solid rgba(200,160,0,.25); border-radius: 8px; padding: 10px 14px; font-size: 12px; font-family: var(--sans); color: #E8C840; margin-top: 10px; }
  .err { background: rgba(240,82,82,.1); border: 1px solid rgba(240,82,82,.25); border-radius: 8px; padding: 10px 14px; font-size: 12px; font-family: var(--sans); color: var(--red); margin-top: 10px; }
  .hint-box { font-family: var(--mono); font-size: 10px; color: var(--gray-dim); background: var(--ink); border-radius: 8px; padding: 9px 13px; margin-top: 10px; line-height: 1.9; border: 1px solid var(--line); }

  @media (max-width: 600px) {
    .g3 { grid-template-columns: repeat(2,1fr); }

</style>

<body>
<div class="grain"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useCallback } = React;

const STOP = new Set(['and','for','only','the','a','an','of','to','in','on','with','by','at','from','or','vs','plus','than','then','also','as','is','are','be','it','&','that','this']);
const AUTO_TYPES = new Set(['close-match','loose-match','substitutes','complements']);
const ASIN_RE = /^b0[a-z0-9]{8}$/i;
const AUD = new Set(['kids','baby','teen','girl','girls','boys','men','ladies','female','male','toddler','infant','children','womens','mens']);
const SZE = new Set(['gallon','bulk','travel','mini','sample','pack','oversized','jumbo','wholesale','bundle']);
const DIY = new Set(['diy','recipe','tutorial','homemade','refill','instructions']);
const ING = new Set(['charcoal','salicylic','retinol','shea','caffeine','exfoliating','argan','collagen']);

const fmt$  = n => '$' + Math.round(Math.abs(n||0)).toLocaleString();
const fmtN  = n => (n < 0 ? '-$' : '$') + Math.round(Math.abs(n||0)).toLocaleString();
const pct   = n => (+(n||0)).toFixed(2) + '%';
const roasS = (s,sp) => sp > 0 ? (s/sp).toFixed(2)+'×' : '—';
const shortC = s => { const p = String(s||'').split('|').map(x=>x.trim()); return p.length >= 3 ? p[1]+' · '+p[2] : String(s||'').slice(0,42); };

function findCol(hdrs, terms) {
  const hl = hdrs.map(h => String(h||'').toLowerCase());
  for (const t of terms) { const i = hl.findIndex(h => h.includes(t)); if (i >= 0) return hdrs[i]; }
  return null;
}
function tkz(text) {
  const s = String(text||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ');
  const ws = s.split(/\s+/).filter(w => w.length > 1 && !STOP.has(w) && !ASIN_RE.test(w));
  const bg = []; for (let i = 0; i < ws.length-1; i++) bg.push(ws[i]+' '+ws[i+1]);
  return [...new Set([...ws,...bg])];
}
function buildProt(brand) {
  const s = new Set(['sand','cloud','turkish','beach','towel','towels','bath','poncho','coverup','cover','hair','wrap','fouta']);
  tkz(brand).forEach(w => s.add(w)); return s;
}
function parseFile(file, cb) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    Papa.parse(file, { header:true, skipEmptyLines:true, complete: r => cb(r.data, r.meta.fields||[]) });
  } else {
    const rd = new FileReader();
    rd.onload = e => {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {defval:''});
      cb(data, data.length ? Object.keys(data[0]) : []);
    };
    rd.readAsArrayBuffer(file);
  }
}
function normRows(data, hdrs) {
  const g = (row,terms) => { const c = findCol(hdrs,terms); return c!=null ? String(row[c]||'').trim() : ''; };
  return data.map(row => ({
    targeting: g(row,['targeting type','targeting','auto type']).toLowerCase(),
    matchType:  g(row,['match type']).toUpperCase().trim(),
    searchTerm: g(row,['customer search term','search term']),
    campaign:   g(row,['campaign name','campaign']),
    spend:  parseFloat(g(row,['spend']))||0,
    sales:  parseFloat(g(row,['7 day total sales','total sales','sales']))||0,
    orders: parseFloat(g(row,['7 day total orders','total orders','orders']))||0,
    clicks: parseFloat(g(row,['clicks']))||0,
  })).filter(r => r.searchTerm && r.campaign);
}
function copyToClipboard(items, onDone) {
  const text = items.join('\n');
  navigator.clipboard.writeText(text).then(onDone).catch(()=>{
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    onDone && onDone();
  });
}

function CopyBtn({ getItems, label = 'Copy keywords' }) {
  const [copied, setCopied] = React.useState(false);
  const handleClick = () => {
    const items = getItems();
    copyToClipboard(items, () => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={handleClick} className={copied ? 'btn-primary' : 'btn-secondary'} style={{minWidth:130}}>
      {copied ? 'Copied' : label}
    </button>
  );
}

const IconUpload = () => (
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
  </svg>
);
const IconLoader = () => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 12a9 9 0 1 1-9-9"/>
  </svg>
);

// shared negation candidate engine
function buildCands(subset, prot, cfg, totalSpend) {
  const { MIN_WASTED, MIN_OCC, TOP_N } = cfg;
  const conv = subset.filter(r=>r.orders>0);
  const cN = conv.length, cS = conv.reduce((s,r)=>s+r.sales,0);
  const cts={}, sal={};
  conv.forEach(r=>{const seen=new Set();r._t.forEach(t=>{if(!seen.has(t)){seen.add(t);cts[t]=(cts[t]||0)+1;sal[t]=(sal[t]||0)+r.sales;}});});
  const top5 = new Set(Object.entries(cts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t])=>t));
  const dynP = new Set(top5);
  Object.entries(cts).forEach(([t,c])=>{if(cN>0&&c/cN>=0.20)dynP.add(t);});
  Object.entries(sal).forEach(([t,s])=>{if(cS>0&&s/cS>=0.05)dynP.add(t);});
  const isProt = tok => {
    const t=tok.toLowerCase(); if(t.length<=3)return true;
    if(prot.has(t)||dynP.has(t))return true;
    for(const w of t.split(' ')) if(prot.has(w)||dynP.has(w))return true;
    return false;
  };
  const byCamp={};
  subset.forEach(r=>{(byCamp[r.campaign]=byCamp[r.campaign]||[]).push(r);});
  const arr=[];
  Object.entries(byCamp).forEach(([camp,cRs])=>{
    const cc=cRs.filter(r=>r.orders>0),ccN=cc.length;
    const cw=cRs.filter(r=>r.orders===0);
    const tks=new Set(); cw.forEach(r=>r._t.forEach(t=>tks.add(t)));
    tks.forEach(tok=>{
      if(isProt(tok))return;
      const wr=cw.filter(r=>r._s.has(tok)); const o0=wr.length; if(o0<MIN_OCC)return;
      const ws=wr.reduce((s,r)=>s+r.spend,0); if(ws<MIN_WASTED)return;
      const cr=cc.filter(r=>r._s.has(tok)); const ov=ccN>0?cr.length/ccN*100:0; if(ov>2)return;
      const cs=cr.reduce((s,r)=>s+r.sales,0),csp=cr.reduce((s,r)=>s+r.spend,0);
      const ni=(cs-csp)-ws; if(ni>0)return;
      const ws2=new Set(tok.split(' ')); let sm=1.0;
      if([...ws2].some(w=>AUD.has(w)))sm=1.50;
      else if([...ws2].some(w=>DIY.has(w)))sm=1.40;
      else if([...ws2].some(w=>SZE.has(w)))sm=1.30;
      else if([...ws2].some(w=>ING.has(w)))sm=1.30;
      const nm=ov===0?1.40:0.80;
      const as=(ws/Math.max(totalSpend,1))*Math.log1p(o0)*sm*nm;
      const mr=(tok.split(' ').length>1&&[...ws2].some(w=>prot.has(w)))?'EXACT':'PHRASE';
      const ev=[...wr].sort((a,b)=>b.spend-a.spend).slice(0,3).map(r=>({t:r.searchTerm,s:r.spend}));
      arr.push({camp,tok,occ:cRs.filter(r=>r._s.has(tok)).length,o0,ws,ov,ni,mr,ev,as});
    });
  });
  return arr.sort((a,b)=>b.as-a.as).slice(0,TOP_N).map((c,i)=>({...c,rank:i+1}));
}

function runAutoAnalysis(rows, prot, cfg) {
  const { LOW_ROAS, TOP_N } = cfg;
  const auto = rows.filter(r=>AUTO_TYPES.has(r.targeting)).map(r=>({...r,_t:tkz(r.searchTerm)}));
  auto.forEach(r=>{r._s=new Set(r._t);});
  if(!auto.length) return null;
  const tSp=auto.reduce((s,r)=>s+r.spend,0);
  const wasted=auto.filter(r=>r.orders===0); const wastedSp=wasted.reduce((s,r)=>s+r.spend,0);
  const conv=auto.filter(r=>r.orders>0);
  const lr=conv.filter(r=>r.spend>0&&r.sales/r.spend<LOW_ROAS);
  const wbt={}; AUTO_TYPES.forEach(t=>{wbt[t]={sp:0,ws:0};});
  auto.forEach(r=>{if(wbt[r.targeting]){wbt[r.targeting].sp+=r.spend;if(r.orders===0)wbt[r.targeting].ws+=r.spend;}});
  const wasteByType=Object.entries(wbt).map(([tp,d])=>({tp,...d,wpct:wastedSp>0?d.ws/wastedSp*100:0,spct:tSp>0?d.sp/tSp*100:0})).sort((a,b)=>b.sp-a.sp);
  return {
    snap:{tSp,orders:auto.reduce((s,r)=>s+r.orders,0),wastedSp,wastedPct:tSp>0?wastedSp/tSp*100:0,lrSp:lr.reduce((s,r)=>s+r.spend,0),lrN:lr.length,lrPct:tSp>0?lr.reduce((s,r)=>s+r.spend,0)/tSp*100:0,wasteByType,N:auto.length},
    topWasted:[...wasted].sort((a,b)=>b.spend-a.spend).slice(0,TOP_N),
    cands:buildCands(auto,prot,cfg,tSp),
    tokens:runTokenImpact(auto,prot),
    autoRows:auto,
  };
}

function runTokenImpact(rows, prot) {
  const conv = rows.filter(r=>r.orders>0);
  const cN = conv.length;

  // build dynamic protection same way as buildCands
  const cS = conv.reduce((s,r)=>s+r.sales,0);
  const cts={}, sal={};
  conv.forEach(r=>{const seen=new Set();r._t.forEach(t=>{if(!seen.has(t)){seen.add(t);cts[t]=(cts[t]||0)+1;sal[t]=(sal[t]||0)+r.sales;}});});
  const top5=new Set(Object.entries(cts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t])=>t));
  const dynP=new Set(top5);
  Object.entries(cts).forEach(([t,c])=>{if(cN>0&&c/cN>=0.20)dynP.add(t);});
  Object.entries(sal).forEach(([t,s])=>{if(cS>0&&s/cS>=0.05)dynP.add(t);});

  const isProt = tok => {
    const t=tok.toLowerCase(); if(t.length<=3)return true;
    if(prot.has(t)||dynP.has(t))return true;
    for(const w of t.split(' ')) if(prot.has(w)||dynP.has(w))return true;
    return false;
  };

  // aggregate stats per token across all rows
  const st={};
  rows.forEach(r=>{
    const seen=new Set();
    r._t.forEach(tok=>{
      if(seen.has(tok)||isProt(tok))return;
      seen.add(tok);
      if(!st[tok])st[tok]={occ:0,wSp:0,cSal:0,cSp:0,cOrd:0,cRows:0};
      st[tok].occ++;
      if(r.orders===0) st[tok].wSp+=r.spend;
      else { st[tok].cSal+=r.sales; st[tok].cSp+=r.spend; st[tok].cOrd+=r.orders; st[tok].cRows++; }
    });
  });

  const MIN_UNI=5, MIN_PH=3;
  const tokens = Object.entries(st).map(([tok,d])=>{
    const isP=tok.includes(' ');
    if(d.occ<(isP?MIN_PH:MIN_UNI))return null;
    const surplus=d.cSal-d.cSp;
    const netImpact=surplus-d.wSp;
    const tRoas=(d.cSp+d.wSp)>0?d.cSal/(d.cSp+d.wSp):0;
    const cOverlap=cN>0?d.cRows/cN*100:0;
    return{tok,isP,...d,surplus,netImpact,tRoas,cOverlap};
  }).filter(Boolean);

  const uni=tokens.filter(t=>!t.isP);
  const ph=tokens.filter(t=>t.isP);
  return{
    worstUni:[...uni].sort((a,b)=>a.netImpact-b.netImpact).slice(0,20),
    bestUni: [...uni].sort((a,b)=>b.netImpact-a.netImpact).slice(0,20),
    worstPh: [...ph].sort((a,b)=>a.netImpact-b.netImpact).slice(0,20),
    bestPh:  [...ph].sort((a,b)=>b.netImpact-a.netImpact).slice(0,20),
  };
}

function runPartB(rows, prot, cfg, matchType) {
  const { TOP_N } = cfg;
  const sub = rows.filter(r=>r.matchType===matchType).map(r=>({...r,_t:tkz(r.searchTerm)}));
  sub.forEach(r=>{r._s=new Set(r._t);});
  if(!sub.length) return null;
  const tSp=sub.reduce((s,r)=>s+r.spend,0);
  const wasted=sub.filter(r=>r.orders===0);
  return {
    N:sub.length, tSp,
    topWasted:[...wasted].sort((a,b)=>b.spend-a.spend).slice(0,TOP_N),
    cands:buildCands(sub,prot,cfg,tSp),
    subRows:sub,
  };
}

function useSort(data,dc,dd='desc'){
  const [col,setCol]=useState(dc); const [dir,setDir]=useState(dd);
  const sorted=useMemo(()=>{
    if(!data||!data.length)return data||[];
    return [...data].sort((a,b)=>{let av=a[col],bv=b[col];if(typeof av==='string'){av=av.toLowerCase();bv=String(bv).toLowerCase();}return dir==='asc'?(av>bv?1:-1):(av<bv?1:-1);});
  },[data,col,dir]);
  const toggle=c=>{if(c===col)setDir(d=>d==='asc'?'desc':'asc');else{setCol(c);setDir('desc');}};
  return{sorted,col,dir,toggle};
}

// ── Gap Analysis engine (STR-only, no separate targeting report) ──────────
const ASIN_BARE = /^b0[a-z0-9]{8}$/i;
function normT(t){ const s=String(t||'').toLowerCase().replace(/[^a-z0-9\s]/g,' '); return s.replace(/\s+/g,' ').trim(); }
function extractAsin(raw){
  const m=raw.match(/asin="?([a-zA-Z0-9]{10})"?/i); if(m)return m[1].toLowerCase();
  if(ASIN_BARE.test(raw.trim()))return raw.trim().toLowerCase();
  return null;
}
// add both singular and plural forms to a set
function addWithVariants(set, nt){
  set.add(nt);
  if(nt.endsWith('s')&&nt.length>3) set.add(nt.slice(0,-1)); // plural → singular
  else if(!nt.endsWith('s')) set.add(nt+'s');                 // singular → plural
}

function runGapAnalysis(strRows, brandTokens){
  const AUTO_PSEUDO=new Set(['close-match','loose-match','substitutes','complements']);

  // Build "already targeted" sets from STR Targeting column
  const exactSet=new Set();
  const phraseList=[];
  const broadList=[];

  strRows.forEach(r=>{
    const raw=String(r.targeting||'').trim();
    const mt=String(r.matchType||'').toUpperCase().trim();
    if(!raw||AUTO_PSEUDO.has(raw.toLowerCase())) return;
    if(raw.toLowerCase().startsWith('category=')||raw.toLowerCase().startsWith('keyword-group')) return;

    const asin=extractAsin(raw);
    if(asin){ exactSet.add(asin); return; }

    // normalise broad modified (+word+word) → plain words
    const nt=normT(raw.replace(/\+/g,' '));
    if(!nt) return;
    if(mt==='EXACT'){ addWithVariants(exactSet,nt); }
    else if(mt==='PHRASE'){ phraseList.push(nt); phraseList.push(nt.endsWith('s')?nt.slice(0,-1):nt+'s'); }
    else if(mt==='BROAD'){ broadList.push(nt); }
    else { addWithVariants(exactSet,nt); } // '-' = treat as exact
  });

  // Aggregate converting search terms
  const convMap={};
  strRows.filter(r=>r.orders>0).forEach(r=>{
    const raw=String(r.searchTerm||'').trim();
    const asin=extractAsin(raw);
    const nk=asin||normT(raw);
    if(!nk) return;
    if(!convMap[nk]) convMap[nk]={term:raw,orders:0,sales:0,spend:0,campaigns:new Set(),isAsin:!!asin};
    convMap[nk].orders+=r.orders;
    convMap[nk].sales+=r.sales;
    convMap[nk].spend+=r.spend;
    convMap[nk].campaigns.add(r.campaign);
  });

  const results=[];
  Object.entries(convMap).forEach(([nk,d])=>{
    // filter branded search terms — skip if term contains any brand token
    if(brandTokens&&brandTokens.size>0){
      const termWords=new Set(nk.split(' '));
      if([...brandTokens].some(bt=>termWords.has(bt))) return;
    }

    // strict exact/ASIN exclusion (including plural variants)
    if(exactSet.has(nk)) return;

    const isAsin=d.isAsin;
    if(isAsin){
      results.push({...d,nk,coverage:'Not targeted',priority:1,suggestedMatch:'PAT (ASIN)',campaigns:[...d.campaigns]});
      return;
    }

    // phrase coverage: search term words must fully contain the phrase target as a contiguous sequence
    const paddedNk=' '+nk+' ';
    const phraseMatch=phraseList.find(pt=>{
      const paddedPt=' '+pt+' ';
      return paddedNk.includes(paddedPt)||nk===pt;
    });
    const nkSet=new Set(nk.split(' '));
    const broadMatch=!phraseMatch&&broadList.find(bt=>bt.split(' ').every(w=>w.length<=2||nkSet.has(w)));

    if(phraseMatch) results.push({...d,nk,coverage:'Phrase only',priority:2,suggestedMatch:'EXACT',campaigns:[...d.campaigns]});
    else if(broadMatch) results.push({...d,nk,coverage:'Broad only',priority:2,suggestedMatch:'PHRASE',campaigns:[...d.campaigns]});
    else results.push({...d,nk,coverage:'Not targeted',priority:1,suggestedMatch:'EXACT',campaigns:[...d.campaigns]});
  });

  return results
    .sort((a,b)=>a.priority-b.priority||b.sales-a.sales)
    .map((r,i)=>({...r,rank:i+1,roas:r.spend>0?r.sales/r.spend:0}));
}

// ── Gap Analysis component ─────────────────────────────────────────────────
function GapAnalysisSection({strRows, brand}){
  const brandTokens=useMemo(()=>{
    if(!brand) return new Set();
    const s=new Set();
    normT(brand).split(' ').filter(w=>w.length>2).forEach(w=>s.add(w));
    return s;
  },[brand]);
  const gaps=useMemo(()=>runGapAnalysis(strRows,brandTokens),[strRows,brandTokens]);
  const[coverFilter,setCoverFilter]=useState('all');
  const[campFilter,setCampFilter]=useState('all');
  const[typeFilter,setTypeFilter]=useState('all');

  const allCamps=useMemo(()=>[...new Set(gaps.flatMap(r=>r.campaigns))].sort(),[gaps]);
  const asinCount=useMemo(()=>gaps.filter(g=>g.isAsin).length,[gaps]);
  const kwCount=useMemo(()=>gaps.filter(g=>!g.isAsin).length,[gaps]);
  const filtered=useMemo(()=>{
    let r=gaps;
    if(coverFilter!=='all') r=r.filter(g=>g.coverage===coverFilter);
    if(campFilter!=='all') r=r.filter(g=>g.campaigns.includes(campFilter));
    if(typeFilter==='asin') r=r.filter(g=>g.isAsin);
    if(typeFilter==='keyword') r=r.filter(g=>!g.isAsin);
    return r;
  },[gaps,coverFilter,campFilter,typeFilter]);
  const{sorted,col,dir,toggle}=useSort(filtered,'rank','asc');

  const notTargeted=gaps.filter(g=>g.coverage==='Not targeted').length;
  const phraseOnly=gaps.filter(g=>g.coverage==='Phrase only').length;
  const broadOnly=gaps.filter(g=>g.coverage==='Broad only').length;
  const gapSales=gaps.filter(g=>g.coverage==='Not targeted').reduce((s,r)=>s+r.sales,0);
  const COVER_COLORS={'Not targeted':['rgba(240,82,82,.12)','var(--red)'],'Phrase only':['rgba(232,200,64,.12)','var(--amber)'],'Broad only':['rgba(255,255,255,.08)','var(--white)']};

  if(!gaps.length) return <div style={{padding:60,textAlign:'center',color:'var(--gray-dim)',fontSize:13}}>No gap recommendations found — all converting search terms are already explicitly targeted.</div>;

  return(
    <div>
      <div className="hint-box" style={{marginBottom:18}}>
        Built from the STR you already uploaded — no second file needed. Targets are identified from the STR's Targeting column. Any term already covered by an exact keyword or PAT target is excluded.
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:12,marginBottom:20}}>
        {[
          {l:'Not targeted',v:notTargeted+' terms',s:fmt$(gapSales)+' in conv. sales',a:'var(--red)'},
          {l:'Phrase only',v:phraseOnly+' terms',s:'Suggest adding exact',a:'var(--amber)'},
          {l:'Broad only',v:broadOnly+' terms',s:'Suggest adding phrase',a:'var(--amber)'},
          {l:'Total gaps',v:gaps.length+' terms',s:'Across all match types',a:null},
        ].map(c=>(
          <div key={c.l} className="card">
            <div className="mc-lbl">{c.l}</div>
            <div className="mc-val" style={{color:c.a||'var(--white)'}}>{c.v}</div>
            <div className="mc-prior neu">{c.s}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
        <span style={{fontSize:12,color:'var(--gray)'}}>Coverage:</span>
        <select value={coverFilter} onChange={e=>setCoverFilter(e.target.value)} className="filter-input" style={{width:'auto'}}>
          <option value="all">All gaps ({gaps.length})</option>
          <option value="Not targeted">Not targeted ({notTargeted})</option>
          <option value="Phrase only">Phrase only ({phraseOnly})</option>
          <option value="Broad only">Broad only ({broadOnly})</option>
        </select>
        <span style={{fontSize:12,color:'var(--gray)',marginLeft:4}}>Campaign:</span>
        <select value={campFilter} onChange={e=>setCampFilter(e.target.value)} className="filter-input" style={{width:'auto',maxWidth:260}}>
          <option value="all">All campaigns</option>
          {allCamps.map(c=><option key={c} value={c}>{shortC(c)}</option>)}
        </select>
        <span style={{fontSize:11,color:'var(--gray-dim)'}}>·</span>
        {[['all','All',gaps.length],['keyword','Keywords',kwCount],['asin','ASINs',asinCount]].map(([v,l,n])=>(
          <button key={v} onClick={()=>setTypeFilter(v)} className={`vtab${typeFilter===v?' on':''}`}>
            {l} <span style={{opacity:.6,fontFamily:'var(--mono)'}}>{n}</span>
          </button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--gray-dim)'}}>{filtered.length} shown</span>
          <CopyBtn getItems={()=>sorted.map(r=>r.term)} label="Copy targets"/>
        </div>
      </div>

      {sorted.length===0
        ?<div style={{padding:48,textAlign:'center',color:'var(--gray-dim)',fontSize:13}}>No gaps for the current filters.</div>
        :<div className="tbl-wrap">
          <table className="tbl">
            <thead><tr>
              <TH l="#"                    c="rank"           sc={col} sd={dir} tg={toggle} w={32}/>
              <TH l="Search term"          c="term"           sc={col} sd={dir} tg={toggle} w={220}/>
              <TH l="Coverage"             c="coverage"       sc={col} sd={dir} tg={toggle} w={120}/>
              <TH l="Orders"               c="orders"         sc={col} sd={dir} tg={toggle} w={68}/>
              <TH l="Conv. sales"          c="sales"          sc={col} sd={dir} tg={toggle} w={90}/>
              <TH l="ROAS"                 c="roas"           sc={col} sd={dir} tg={toggle} w={72}/>
              <TH l="Suggested"            c="suggestedMatch" sc={col} sd={dir} tg={toggle} w={100}/>
              <TH l="Converting campaigns" c={null}           sc={col} sd={dir} tg={toggle}/>
            </tr></thead>
            <tbody>
              {sorted.map((r,i)=>{
                const[bg,tx]=COVER_COLORS[r.coverage]||['rgba(255,255,255,.06)','var(--gray)'];
                return(
                  <tr key={i}>
                    <TD sx={{fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-dim)'}} v={r.rank}/>
                    <TD sx={{fontSize:12,fontWeight:500,fontFamily:r.isAsin?'var(--mono)':'inherit',color:'var(--white)',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'left'}} v={<span title={r.term}>{r.term}</span>}/>
                    <TD v={<span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:500,fontFamily:'var(--mono)',border:'1px solid var(--line)',background:bg,color:tx,whiteSpace:'nowrap'}}>{r.coverage}</span>}/>
                    <TD sx={{fontFamily:'var(--mono)',fontSize:11,textAlign:'right',color:'var(--white)'}} v={r.orders}/>
                    <TD sx={{fontFamily:'var(--mono)',color:'var(--green)',fontWeight:500}} v={fmt$(r.sales)}/>
                    <TD sx={{fontFamily:'var(--mono)',color:'var(--white)'}} v={r.roas>0?r.roas.toFixed(2)+'×':'—'}/>
                    <TD v={<Badge v={r.suggestedMatch}/>}/>
                    <TD sx={{fontSize:11,color:'var(--gray)',lineHeight:1.7}} v={r.campaigns.map(c=><div key={c} style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={c}>{c}</div>)}/>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>}
      <div style={{fontSize:11,color:'var(--gray-dim)',marginTop:8,lineHeight:1.6}}>
        "Not targeted" = no keyword or ASIN target matches this term. "Phrase only" = covered by phrase match but no exact. "Broad only" = broad word overlap only.
      </div>
    </div>
  );
}

function App(){

  const[fileName,setFileName]=useState('');
  const[section,setSection]=useState('auto');
  const[tab,setTab]=useState('snapshot');
  const[showCfg,setShowCfg]=useState(false);
  const[dragging,setDragging]=useState(false);
  const[processing,setProcessing]=useState(false);
  const fileRef=useRef(null);
  const prot=useMemo(()=>buildProt(brand),[brand]);

  const runAll=useCallback((rows,p,c)=>({
    auto:   runAutoAnalysis(rows,p,c),
    phrase: runPartB(rows,p,c,'PHRASE'),
    broad:  runPartB(rows,p,c,'BROAD'),
  }),[]);

  const handleFile=useCallback(file=>{
    setProcessing(true);setFileName(file.name);
    parseFile(file,(data,hdrs)=>{
      const rows=normRows(data,hdrs);
      setRawRows(rows);
      setResults(runAll(rows,prot,cfg));

  const handleSetCfg=useCallback(newCfg=>{
    setCfg(newCfg);
    setResults(prev=>{
      if(!rawRows.length)return prev;
      const p=buildProt(brand);
      return runAll(rawRows,p,newCfg);
    });
  },[rawRows,brand,runAll]);
  const handleSection=s=>{
    setSection(s);
    const sec=SECTIONS.find(x=>x.id===s);
    if(sec.tabs.length>0) setTab(sec.tabs[0].id);

        {curSec.tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`stab${tab===t.id?' on':''}`} style={{display:'flex',alignItems:'center',gap:6}}>
            {t.label}
            {t.id==='cands'&&<span style={{fontSize:10,fontFamily:'var(--mono)',background:'rgba(255,255,255,.06)',padding:'1px 6px',borderRadius:10,color:'var(--gray-dim)'}}>{candFor(section)}</span>}
          </button>
        ))}
      </div>}

      {/* content */}
      <div style={{padding:'24px',maxWidth:1400,margin:'0 auto',minHeight:'calc(100vh - 130px)'}}>
        {section==='auto'&&!autoR&&<Empty msg="No Auto rows found in this report."/>}
        {section==='auto'&&autoR&&tab==='snapshot'&&<SnapshotTab snap={autoR.snap}/>}
        {section==='auto'&&autoR&&tab==='wasted'  &&<WastedTab topWasted={autoR.topWasted} showType={true} showCampFilter={true} exportName="auto_wasted_terms.csv"/>}
        {section==='auto'&&autoR&&tab==='cands'   &&<CandsTab cands={autoR.cands}   rows={autoR.autoRows} exportName="auto_neg_candidates.csv"/>}
        {section==='auto'&&autoR&&tab==='tokens'  &&<TokenImpactTab tokens={autoR.tokens}/>}

        {section==='phrase'&&!phraseR&&<Empty msg="No Phrase match rows found in this report."/>}
        {section==='phrase'&&phraseR &&tab==='wasted'&&<WastedTab topWasted={phraseR.topWasted} showType={false} showCampFilter={true} showAsinFilter={false} exportName="phrase_wasted_terms.csv"/>}
        {section==='phrase'&&phraseR &&tab==='cands' &&<CandsTab cands={phraseR.cands} rows={phraseR.subRows} exportName="phrase_neg_candidates.csv"/>}

        {section==='broad'&&!broadR&&<Empty msg="No Broad match rows found in this report."/>}
        {section==='broad'&&broadR  &&tab==='wasted'&&<WastedTab topWasted={broadR.topWasted} showType={false} showCampFilter={true} showAsinFilter={false} exportName="broad_wasted_terms.csv"/>}
        {section==='broad'&&broadR  &&tab==='cands' &&<CandsTab cands={broadR.cands} rows={broadR.subRows} exportName="broad_neg_candidates.csv"/>}

        {section==='gaps'&&<GapAnalysisSection strRows={rawRows} brand={brand}/>}      </div>

      {showCfg&&<ConfigPanel cfg={cfg} setCfg={handleSetCfg} onClose={()=>setShowCfg(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
